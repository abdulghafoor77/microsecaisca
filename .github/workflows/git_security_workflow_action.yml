name: Secure-by-Design (SAST, SCA tools)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security:
    name: Run SCA and Security Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install tools
        run: |
          pip install bandit pip-audit

      - name: Run Bandit
        run: bandit -r .

      - name: Run pip-audit
        run: pip-audit -r requirements.txt

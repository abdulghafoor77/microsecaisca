    "paths": {
        "/v1/medical/report/store": {
            "post": {
                "tags": [
                    "Medical Report Demo"
                ],
                "summary": "Store report (sanitized)",
                "description": "Sanitize inputs before persisting.",
                "operationId": "storeSafe",
                "requestBody": {
                    "description": "MedicalReport JSON",
                    "content": {
                        "application/json": {
                            "schema": {
                                "$ref": "#/components/schemas/MedicalReportReq"
                            }
                        }
                    },
                    "required": true
                },
                "responses": {
                    "200": {
                        "description": "Saved sanitized report",
                        "content": {
                            "*/*": {
                                "schema": {
                                    "$ref": "#/components/schemas/MedicalReportReq"
                                }
                            }
                        }
                    },
                    "401": {
                        "description": "Unauthorized",
                        "content": {
                            "*/*": {
                                "schema": {
                                    "$ref": "#/components/schemas/MedicalReport"
                                }
                            }
                        }
                    }
                },
                "security": [
                    {
                        "bearerAuth": []
                    }
                ]
            }
        },
        "/v1/medical/report/login": {
            "post": {
                "tags": [
                    "Medical Report Demo"
                ],
                "summary": "loginreport (sanitized)",
                "description": "Sanitize inputs before persisting.",

                                    "$ref": "#/components/schemas/LoginReq"
                                }
                            }
                        }
                    }
                }
            }
        },
        "/v1/medical/report/deserialize": {
            "post": {
                "tags": [
                    "Medical Report Demo"
                ],
                "summary": "Reject insecure deserialization",
                "description": "Rejects binary deserialization and asks for JSON instead.",
                "operationId": "deserializeSafe",
                "requestBody": {
                    "content": {
                        "text/plain": {
                            "schema": {
                                "type": "string"
                            }
                        }
                    },
                    "required": true
                },
                "responses": {
                    "400": {
                        "description": "Deserialization disabled",
                        "content": {
                            "*/*": {
                                "schema": {
                                    "type": "string"
                                }
                            }
                        }
                    }
                }
            }
        },
        "/v1/medical/report/find": {
            "get": {
                "tags": [
                    "Medical Report Demo"
                ],
                "summary": "Find reports (JPA/parameterized)",
                "description": "Search by patientId safely (JPA parameterized).",
                "operationId": "findByPatientIdSafe",
                "parameters": [
                    {
                        "name": "pid",
                        "in": "query",
                        "description": "patientId pattern",
                        "required": true,
                        "schema": {
                            "type": "string"
                        }
                    }
                ],
                "responses": {
                    "200": {
                        "description": "Paged results",
                        "content": {
                            "application/json": {}
                        }
                    },
                    "401": {
                        "description": "Unauthorized",
                        "content": {
